<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.6"/>
  
  <!-- Geometric Frame -->
  <g stroke="#D4AF37" stroke-width="1.5" fill="none" opacity="0.4">
    <!-- Top Triangle -->
    <line x1="100" y1="40" x2="140" y2="80"/>
    <line x1="100" y1="40" x2="60" y2="80"/>
    <!-- Bottom Triangle -->
    <line x1="60" y1="120" x2="140" y2="120"/>
    <line x1="60" y1="120" x2="100" y2="160"/>
    <line x1="140" y1="120" x2="100" y2="160"/>
  </g>
  
  <!-- Main Diamond/Gem Shape -->
  <g>
    <!-- Outer Gem (Dark Green) -->
    <polygon points="100,50 140,100 100,150 60,100" fill="#14532D" opacity="0.9"/>
    
    <!-- Inner Mountains (Tan/Gold) -->
    <polygon points="100,70 125,100 115,130 100,120 85,130 75,100" fill="#D4A574"/>
    
    <!-- Star/Gem Center (Bright Gold) -->
    <polygon points="100,80 105,95 100,105 95,95" fill="#D4AF37"/>
    <polygon points="90,95 100,92 110,95 100,100" fill="#F4E4C1" opacity="0.8"/>
  </g>
  
  <!-- Accent Elements -->
  <g fill="#D4AF37" opacity="0.6">
    <circle cx="100" cy="55" r="3"/>
    <circle cx="140" cy="100" r="3"/>
    <circle cx="100" cy="145" r="3"/>
    <circle cx="60" cy="100" r="3"/>
  </g>
  
  <!-- Subtle Glow -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <polygon points="100,50 140,100 100,150 60,100" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.3" filter="url(#glow)"/>
</svg>